[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Pytest markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires test DB/services)
    e2e: End-to-end tests (requires real LLM API keys)
    stress: Stress/load tests (very slow)
    expensive: Tests that cost money (real API calls)

# Asyncio configuration
asyncio_mode = auto

# Coverage options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Logging
log_cli = false
log_cli_level = INFO
